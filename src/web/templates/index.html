{% extends "layout.html" %}
{% block content %}

<!-- Exercise name datalist for autocomplete -->
<datalist id="exercise-list">
    {% for name in exercise_names %}
    <option value="{{ name }}">
    {% endfor %}
</datalist>

<!-- ── LAST WORKOUT ───────────────────────────────────────────────────────── -->
{% if last_workout %}
<div class="card" style="padding:14px 20px;">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
        <span class="muted text-sm" style="font-weight:600;">
            LAST — {{ last_workout[1] }}
            <span class="badge badge-{% if last_workout[2] == 'PUSH' %}push{% elif last_workout[2] == 'PULL' %}pull{% elif last_workout[2] == 'LEGS' %}legs{% elif last_workout[2] == 'CARDIO' %}cardio{% else %}default{% endif %}" style="margin-left:6px;">{{ last_workout[2] }}</span>
        </span>
        <span class="muted text-sm" style="white-space:pre-wrap; word-break:break-word; max-width:500px;">{{ last_workout[3] }}</span>
    </div>
</div>
{% endif %}

<!-- ── WORKOUT NOTEBOOK ───────────────────────────────────────────────────── -->
<div class="card">

    <!-- Header row: date + day type -->
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px;">
        <div>
            <label for="workout-date" style="margin-bottom:3px;">Date</label>
            <input type="date" id="workout-date" value="{{ today }}" style="width:auto;">
        </div>
        <div style="flex:1;">
            <label style="margin-bottom:3px;">Workout Type</label>
            <div class="chip-group" id="day-type-chips">
                <button type="button" class="chip push active-chip"   onclick="setDayType('PUSH',     this)">Push</button>
                <button type="button" class="chip pull"               onclick="setDayType('PULL',     this)">Pull</button>
                <button type="button" class="chip legs"               onclick="setDayType('LEGS',     this)">Legs</button>
                <button type="button" class="chip cardio"             onclick="setDayType('CARDIO',   this)">Cardio</button>
                <button type="button" class="chip"                    onclick="setDayType('HYBRID',   this)">Full Body</button>
            </div>
        </div>
    </div>

    <!-- Exercise blocks container -->
    <div id="exercise-blocks"></div>

    <!-- Add exercise row -->
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:4px;">
        <input type="text" id="new-exercise-name" list="exercise-list"
               placeholder="Exercise name…" style="flex:1; min-width:180px;"
               onkeydown="if(event.key==='Enter'){event.preventDefault(); addExercise('lift');}">
        <div style="display:flex; gap:6px;">
            <button type="button" class="btn btn-outline btn-sm" onclick="addExercise('lift')">+ Lift</button>
            <button type="button" class="btn btn-outline btn-sm" style="border-color:var(--cardio);color:var(--cardio);" onclick="addExercise('cardio')">+ Cardio</button>
        </div>
    </div>

    <!-- Save button -->
    <div style="margin-top:20px; display:flex; gap:10px; align-items:center;">
        <button type="button" class="btn btn-success" onclick="saveWorkout()" id="save-btn" disabled>Save Workout</button>
        <span class="muted text-sm" id="exercise-count"></span>
    </div>
</div>

<!-- Hidden form for submission -->
<form id="workout-form" action="/log_workout" method="POST" style="display:none;">
    <input type="hidden" name="date"           id="form-date">
    <input type="hidden" name="day_type"       id="form-day-type">
    <input type="hidden" name="exercises_json" id="form-exercises-json">
</form>

<style>
    .exercise-block {
        border: 1.5px solid var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        overflow: hidden;
    }
    .exercise-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        gap: 8px;
    }
    .exercise-name-display {
        font-weight: 700;
        font-size: .95rem;
        flex: 1;
    }
    .set-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        border-bottom: 1px solid var(--border);
    }
    .set-row:last-child { border-bottom: none; }
    .set-num {
        font-size: .75rem;
        font-weight: 700;
        color: var(--muted);
        width: 38px;
        flex-shrink: 0;
    }
    .set-row input[type="number"] {
        width: 72px;
        padding: 6px 8px;
        font-size: .9rem;
        text-align: center;
    }
    .set-row label {
        font-size: .75rem;
        color: var(--muted);
        margin: 0;
        font-weight: 600;
    }
    .set-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: var(--surface2);
    }
    .chip.active-chip {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
    }
    .chip.push.active-chip   { background: var(--push);   border-color: var(--push); }
    .chip.pull.active-chip   { background: var(--pull);   border-color: var(--pull); }
    .chip.legs.active-chip   { background: var(--legs);   border-color: var(--legs); }
    .chip.cardio.active-chip { background: var(--cardio); border-color: var(--cardio); }
    .btn-remove {
        background: none; border: none; cursor: pointer;
        color: var(--muted); font-size: 1.1rem; padding: 2px 6px;
        border-radius: 4px; line-height: 1;
    }
    .btn-remove:hover { color: var(--danger); background: #fee2e2; }
    .cardio-fields { padding: 10px 14px; display: flex; gap: 12px; flex-wrap: wrap; }
    .cardio-fields > div { display: flex; flex-direction: column; gap: 4px; }
    .cardio-fields input { width: 130px; }
</style>

<script>
    // ── State ─────────────────────────────────────────────────────────────────
    let exercises = [];
    let dayType   = 'PUSH';
    let blockIdx  = 0;

    // ── Day type selection ────────────────────────────────────────────────────
    function setDayType(dt, btn) {
        dayType = dt;
        document.querySelectorAll('#day-type-chips .chip').forEach(c => c.classList.remove('active-chip'));
        btn.classList.add('active-chip');
    }

    // ── Add exercise block ────────────────────────────────────────────────────
    function addExercise(type) {
        const nameInput = document.getElementById('new-exercise-name');
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }

        const id = blockIdx++;
        const ex = type === 'cardio'
            ? { id, name, type, duration: '', distance: '' }
            : { id, name, type, sets: [{ reps: '', weight: '' }] };

        exercises.push(ex);
        nameInput.value = '';
        renderBlocks();
        nameInput.focus();
    }

    // ── Remove exercise ───────────────────────────────────────────────────────
    function removeExercise(id) {
        syncState();
        exercises = exercises.filter(e => e.id !== id);
        renderBlocks();
    }

    // ── Add set ───────────────────────────────────────────────────────────────
    function addSet(id) {
        syncState();
        const ex = exercises.find(e => e.id === id);
        if (ex) ex.sets.push({ reps: '', weight: '' });
        renderBlocks();
        // Focus the new reps input
        setTimeout(() => {
            const block = document.querySelector(`[data-id="${id}"]`);
            if (block) {
                const inputs = block.querySelectorAll('.set-row input[type="number"]');
                if (inputs.length >= 2) inputs[inputs.length - 2].focus();
            }
        }, 30);
    }

    // ── Remove set ────────────────────────────────────────────────────────────
    function removeSet(id, setIdx) {
        syncState();
        const ex = exercises.find(e => e.id === id);
        if (ex && ex.sets.length > 1) ex.sets.splice(setIdx, 1);
        renderBlocks();
    }

    // ── Read current input values back into state ─────────────────────────────
    function syncState() {
        exercises.forEach(ex => {
            if (ex.type === 'cardio') {
                const dur  = document.getElementById(`dur-${ex.id}`);
                const dist = document.getElementById(`dist-${ex.id}`);
                if (dur)  ex.duration = dur.value.trim();
                if (dist) ex.distance = dist.value.trim();
            } else {
                ex.sets.forEach((s, i) => {
                    const r = document.getElementById(`reps-${ex.id}-${i}`);
                    const w = document.getElementById(`wt-${ex.id}-${i}`);
                    if (r) s.reps   = r.value;
                    if (w) s.weight = w.value;
                });
            }
        });
    }

    // ── Render all exercise blocks ────────────────────────────────────────────
    function renderBlocks() {
        const container = document.getElementById('exercise-blocks');
        container.innerHTML = '';

        exercises.forEach(ex => {
            const div = document.createElement('div');
            div.className = 'exercise-block';
            div.dataset.id = ex.id;

            if (ex.type === 'cardio') {
                div.innerHTML = `
                    <div class="exercise-header">
                        <span class="exercise-name-display">🏃 ${ex.name}</span>
                        <span class="badge badge-cardio">Cardio</span>
                        <button class="btn-remove" onclick="removeExercise(${ex.id})" title="Remove">×</button>
                    </div>
                    <div class="cardio-fields">
                        <div>
                            <label>Duration</label>
                            <input type="text" id="dur-${ex.id}" value="${ex.duration}" placeholder="e.g. 30 mins">
                        </div>
                        <div>
                            <label>Distance (optional)</label>
                            <input type="text" id="dist-${ex.id}" value="${ex.distance}" placeholder="e.g. 5 km">
                        </div>
                    </div>`;
            } else {
                const setRows = ex.sets.map((s, i) => `
                    <div class="set-row">
                        <span class="set-num">Set ${i + 1}</span>
                        <label>Reps</label>
                        <input type="number" id="reps-${ex.id}-${i}" value="${s.reps}" min="1" placeholder="—">
                        <label>kg</label>
                        <input type="number" id="wt-${ex.id}-${i}" value="${s.weight}" min="0" step="0.5" placeholder="—">
                        ${ex.sets.length > 1
                            ? `<button class="btn-remove" onclick="removeSet(${ex.id},${i})" title="Remove set">×</button>`
                            : ''}
                    </div>`).join('');

                div.innerHTML = `
                    <div class="exercise-header">
                        <span class="exercise-name-display">${ex.name}</span>
                        <button class="btn-remove" onclick="removeExercise(${ex.id})" title="Remove">×</button>
                    </div>
                    ${setRows}
                    <div class="set-actions">
                        <button type="button" class="btn btn-outline btn-sm" onclick="addSet(${ex.id})">+ Add Set</button>
                    </div>`;
            }
            container.appendChild(div);
        });

        const saveBtn = document.getElementById('save-btn');
        const countEl = document.getElementById('exercise-count');
        saveBtn.disabled = exercises.length === 0;
        countEl.textContent = exercises.length
            ? `${exercises.length} exercise${exercises.length > 1 ? 's' : ''} added`
            : '';
    }

    // ── Save ──────────────────────────────────────────────────────────────────
    function saveWorkout() {
        syncState();
        if (!exercises.length) return;

        document.getElementById('form-date').value           = document.getElementById('workout-date').value;
        document.getElementById('form-day-type').value       = dayType;
        document.getElementById('form-exercises-json').value = JSON.stringify(exercises);
        document.getElementById('workout-form').submit();
    }

    // Ctrl+Enter to save
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') saveWorkout();
    });
</script>

{% endblock %}
